<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnicas Participativas - Portal Educativo</title>
    <style>
        /* Estilos base (mismo diseño que revistas.html) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        h1 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Grid de libros */
        .libros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }
        
        /* Tarjeta de libro */
        .libro-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            text-align: center;
        }
        
        .libro-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        /* Portada del libro */
        .portada-container {
            width: 100%;
            height: 280px;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        .portada-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .libro-card:hover .portada-container img {
            transform: scale(1.05);
        }
        
        /* Título del libro */
        .libro-titulo {
            color: #667eea;
            font-size: 1.1rem;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .libro-subtitulo {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        /* Botones de acción */
        .acciones-libro {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-ver {
            background: #f0f0f0;
            color: #555;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
            border: 2px solid #ddd;
        }
        
        .btn-ver:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .btn-descargar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-descargar:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .libros-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .portada-container {
                height: 200px;
            }
        }
        
        @media (max-width: 400px) {
            .libros-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Volver al inicio</a>
        
        <h1>🤝 Técnicas Participativas</h1>
        <p class="subtitle">Metodologías prácticas para dinamizar tus procesos educativos</p>
        
        <!-- Grid de libros -->
        <div class="libros-grid" id="listaLibros">
            <!-- Los libros se cargan desde JavaScript -->
        </div>
    </div>

    <script>
        // 📚 BASE DE DATOS DE LIBROS
        const libros = [
            {
                id: 1,
                titulo: "Técnicas participativas de eduacadores cubanos",
                subtitulo: "Vol. 1 -" ,
                portada: "imagenes/port1.jpg",
                archivo: "tecnicas/libro1.pdf"
            },
            {
                id: 2,
                titulo: "Técnicas participativas de eduacadores cubanos",
                subtitulo: "Vol. 2-",
                portada: "imagenes/port2.jpg",
                archivo: "tecnicas/libro2.pdf"
            },
            {
                id: 3,
                titulo: "Técnicas participativas de eduacadores cubanos",
                subtitulo: "Vol. 3 -",
                portada: "imagenes/port3.jpg",
                archivo: "tecnicas/libro3.pdf"
            },
            {
                id: 4,
                titulo: "Técnicas participativas de eduacadores cubanos",
                subtitulo: "Vol. 4 -",
                portada: "imagenes/port4.jpg",
                archivo: "tecnicas/libro4.pdf"
            },
            {
                id: 5,
                titulo: "Técnicas participativas de eduacadores cubanos",
                subtitulo: "Vol. 5 -",
                portada: "imagenes/port5.jpg",
                archivo: "tecnicas/libro5.pdf"
            }
        ];

        // 🚀 INICIALIZAR
        document.addEventListener('DOMContentLoaded', function() {
            renderizarLibros();
        });

        // 📋 RENDERIZAR LIBROS
        function renderizarLibros() {
            const contenedor = document.getElementById('listaLibros');
            
            contenedor.innerHTML = libros.map(libro => `
                <div class="libro-card">
                    <div class="portada-container">
                        <img src="${libro.portada}" alt="${libro.titulo}">
                    </div>
                    <h3 class="libro-titulo">${libro.titulo}</h3>
                    <p class="libro-subtitulo">${libro.subtitulo}</p>
                    <div class="acciones-libro">
                        <a href="${libro.archivo}" class="btn-ver" target="_blank">👁️ Ver</a>
                        <a href="${libro.archivo}" class="btn-descargar" download>📥 Descargar</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
